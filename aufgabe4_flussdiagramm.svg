<svg viewBox="0 0 520 820" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="13">
  <rect width="520" height="820" fill="#f8f9fa"/>
  <text x="260" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Aufgabe 4 – Flussdiagramm: Anmeldeprozess</text>

  <!-- START -->
  <ellipse cx="260" cy="65" rx="70" ry="22" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>
  <text x="260" y="70" text-anchor="middle" fill="white" font-weight="bold">START</text>

  <!-- Arrow -->
  <line x1="260" y1="87" x2="260" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Passwort eingeben -->
  <rect x="160" y="110" width="200" height="40" rx="4" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
  <text x="260" y="135" text-anchor="middle" fill="white">Passwort eingeben</text>

  <line x1="260" y1="150" x2="260" y2="175" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Versuchszähler++ -->
  <rect x="160" y="175" width="200" height="40" rx="4" fill="#607d8b" stroke="#37474f" stroke-width="2"/>
  <text x="260" y="200" text-anchor="middle" fill="white">Versuchszähler + 1</text>

  <line x1="260" y1="215" x2="260" y2="240" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Raute: Passwort korrekt? -->
  <polygon points="260,240 360,280 260,320 160,280" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
  <text x="260" y="277" text-anchor="middle" fill="white" font-weight="bold">Passwort</text>
  <text x="260" y="293" text-anchor="middle" fill="white" font-weight="bold">korrekt?</text>

  <!-- JA -->
  <line x1="260" y1="320" x2="260" y2="355" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="342" fill="#2e7d32" font-weight="bold">JA</text>

  <!-- Login erfolgreich -->
  <rect x="160" y="355" width="200" height="40" rx="4" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>
  <text x="260" y="380" text-anchor="middle" fill="white">Login erfolgreich</text>

  <line x1="260" y1="395" x2="260" y2="430" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ENDE (Erfolg) -->
  <ellipse cx="260" cy="450" rx="70" ry="22" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>
  <text x="260" y="455" text-anchor="middle" fill="white" font-weight="bold">ENDE</text>

  <!-- NEIN nach rechts -->
  <line x1="360" y1="280" x2="420" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="378" y="272" fill="#c62828" font-weight="bold">NEIN</text>

  <!-- Raute: Versuche < 3? -->
  <polygon points="420,280 500,310 420,340 340,310" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
  <text x="420" y="307" text-anchor="middle" fill="white" font-weight="bold">Versuche</text>
  <text x="420" y="322" text-anchor="middle" fill="white" font-weight="bold">&lt; 3?</text>

  <!-- JA: zurück zu Eingabe -->
  <line x1="420" y1="280" x2="420" y2="130" stroke="#333" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="420" y1="130" x2="362" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="205" fill="#2e7d32" font-weight="bold">JA</text>

  <!-- NEIN: gesperrt 15 min -->
  <line x1="420" y1="340" x2="420" y2="490" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="418" fill="#c62828" font-weight="bold">NEIN</text>

  <rect x="330" y="490" width="200" height="45" rx="4" fill="#f44336" stroke="#b71c1c" stroke-width="2"/>
  <text x="430" y="510" text-anchor="middle" fill="white">Konto gesperrt</text>
  <text x="430" y="527" text-anchor="middle" fill="white">für 15 Minuten</text>

  <line x1="430" y1="535" x2="430" y2="570" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Raute: Nach 15 Min erneut versucht? -->
  <polygon points="430,570 510,610 430,650 350,610" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
  <text x="430" y="607" text-anchor="middle" fill="white" font-weight="bold">Wieder</text>
  <text x="430" y="623" text-anchor="middle" fill="white" font-weight="bold">falsch?</text>

  <!-- JA: permanent gesperrt -->
  <line x1="430" y1="650" x2="430" y2="695" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="675" fill="#c62828" font-weight="bold">JA</text>

  <rect x="330" y="695" width="200" height="45" rx="4" fill="#b71c1c" stroke="#7f0000" stroke-width="2"/>
  <text x="430" y="715" text-anchor="middle" fill="white">Konto permanent</text>
  <text x="430" y="732" text-anchor="middle" fill="white">gesperrt → Admin</text>

  <!-- NEIN: Login erfolgreich -->
  <line x1="350" y1="610" x2="260" y2="610" stroke="#333" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="260" y1="610" x2="260" y2="475" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="600" fill="#2e7d32" font-weight="bold">NEIN</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>
